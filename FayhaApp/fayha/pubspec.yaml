name: fayha
description: "Fayha National Choir app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  supabase_flutter: ^2.5.0
  image_picker: ^1.1.2
  record: ^7.1.1
  audioplayers: ^6.1.0
  path_provider: ^2.1.4
  http: ^1.2.0
  shared_preferences: ^2.3.2
  file_selector: ^1.0.3
  geolocator: ^13.0.1
  video_player: ^2.9.1
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0
  youtube_player_iframe: ^5.2.0
  # Required transitive — without this declared explicitly the
  # Android / iOS WebView platform impls don't always register and
  # YoutubePlayer throws "WebViewPlatform.instance == null".
  webview_flutter: ^4.10.0
  # Audio compression for MP3 files > 3 MB before upload.
  ffmpeg_kit_flutter_new: ^4.3.2
  # Push notifications — requires native Firebase setup:
  #   Android: add android/app/google-services.json and apply the
  #            google-services Gradle plugin (see supabase/push_fcm.sql).
  #   iOS:     add ios/Runner/GoogleService-Info.plist (drag into Xcode)
  #            and enable Push Notifications + Background Modes capabilities.
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/icon/
