name: fayha
description: "Fayha National Choir app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  supabase_flutter: ^2.5.0
  image_picker: ^1.1.2
  record: ^5.1.2
  audioplayers: ^6.1.0
  path_provider: ^2.1.4
  http: ^1.2.0
  shared_preferences: ^2.3.2
  file_selector: ^1.0.3
  geolocator: ^13.0.1
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
