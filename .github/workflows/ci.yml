name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: FayhaApp/fayha

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: format check + static analysis + unit/widget tests
  # Fast feedback (~2–3 min). Runs on every push and every PR.
  # ──────────────────────────────────────────────────────────────
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Static analysis
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --reporter=expanded

  # ──────────────────────────────────────────────────────────────
  # Job 2: web build — verifies the Dart compiles end-to-end.
  # Only runs after Job 1 passes. Uses ubuntu (no macOS cost).
  # ──────────────────────────────────────────────────────────────
  build-web:
    name: Build Web
    needs: analyze-and-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (release)
        run: flutter build web --release --no-tree-shake-icons
